<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scapegrace</title>
    <link id="font-link" rel="stylesheet" href="">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #ccc;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #hud-bar {
            background: #111;
            padding: 5px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            font-size: 0.75em;
        }
        #hud-bar h1 { font-size: 1em; color: #e94560; letter-spacing: 3px; font-family: monospace; }
        .hp-good { color: #66bb6a !important; }
        .hp-mid { color: #ffa726 !important; }
        .hp-low { color: #ef5350 !important; }

        #title-banner {
            text-align: center;
            padding: 20px 20px 8px;
            flex-shrink: 0;
        }
        #level-title {
            font-size: 4em;
            color: #e0d5c0;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }
        #level-desc {
            font-size: 2.2em;
            color: #777;
            font-style: italic;
            max-width: none;
            margin: 0 auto;
            line-height: 1.5;
        }

        #content-row {
            flex: 1;
            display: flex;
            flex-direction: row;
            min-height: 0;
        }
        #left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        #map-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }
        #map-canvas { image-rendering: pixelated; }
        #log-panel {
            height: 130px;
            border-top: 1px solid #222;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        #log {
            flex: 1;
            overflow-y: auto;
            padding: 6px 16px;
            font-size: 0.85em;
            line-height: 1.4;
        }
        .log-entry { margin-bottom: 1px; }
        #controls {
            padding: 3px 16px;
            color: #2a2a2a;
            font-size: 0.65em;
            border-top: 1px solid #1a1a1a;
        }
        #right-col {
            width: 240px;
            flex-shrink: 0;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }
        #legend-panel {
            flex: 1;
            padding: 10px 14px;
            font-size: 0.85em;
            color: #888;
            overflow-y: auto;
        }
        #legend-panel h4 {
            color: #555;
            font-size: 0.8em;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        #stats-panel {
            border-top: 1px solid #222;
            padding: 10px 14px;
            font-size: 0.8em;
            line-height: 1.7;
            color: #666;
            flex-shrink: 0;
        }
        #stats-panel .label { color: #444; }
        #stats-panel .val { color: #aaa; }
        #legend {}
        .legend-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            line-height: 1.3;
            white-space: nowrap;
        }

        #overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0a;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; z-index: 100;
        }
        #overlay.show { display: flex; }
        #overlay p { color: #888; font-size: 1.1em; }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid #333; border-top-color: #e94560;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #start-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0a;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 24px; z-index: 100;
        }
        #start-screen.hide { display: none; }
        #start-screen h1 { color: #e94560; font-size: 3em; letter-spacing: 6px; }
        #start-screen .start-btn {
            background: #e94560; color: #fff; border: none;
            padding: 16px 48px; font-family: inherit; font-size: 1.2em;
            border-radius: 4px; cursor: pointer; letter-spacing: 2px;
        }
        #start-screen .start-btn:hover { background: #d63851; }

        #game-over, #victory {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; z-index: 100;
        }
        #game-over.show, #victory.show { display: flex; }
        #game-over h2 { color: #ef5350; font-size: 2.5em; }
        #game-over p, #victory p { color: #888; font-size: 1.1em; }
        #victory h2 { color: #ffd700; font-size: 2.5em; }
        .end-btn {
            background: #e94560; color: #fff; border: none;
            padding: 12px 32px; font-family: inherit; font-size: 1em;
            border-radius: 4px; cursor: pointer; margin-top: 8px;
        }

        /* Confetti */
        .confetti {
            position: fixed; top: -10px; width: 10px; height: 10px;
            z-index: 101; pointer-events: none; border-radius: 2px;
            animation: confetti-fall linear forwards;
        }
        @keyframes confetti-fall {
            to { top: 110vh; transform: rotate(720deg); }
        }
    </style>
</head>
<body>
    <div id="hud-bar">
        <h1>SCAPEGRACE</h1>
    </div>

    <div id="title-banner">
        <div id="level-title"></div>
        <div id="level-desc"></div>
    </div>

    <div id="content-row">
        <div id="left-col">
            <div id="map-panel">
                <canvas id="map-canvas"></canvas>
            </div>
            <div id="log-panel">
                <div id="log"></div>
                <div id="controls">WASD to move · bump to attack · P: potion · find and defeat the boss</div>
            </div>
        </div>
        <div id="right-col">
            <div id="legend-panel">
                <h4>LEGEND</h4>
                <div id="legend"></div>
            </div>
            <div id="stats-panel">
                <span class="label">HP</span> <span id="sr-hp" class="val"></span><br>
                <span class="label">LVL</span> <span id="sr-lvl" class="val"></span>
                <span class="label">XP</span> <span id="sr-xp" class="val"></span><br>
                <span class="label">ATK</span> <span id="sr-atk" class="val"></span>
                <span class="label">DEF</span> <span id="sr-def" class="val"></span><br>
                <span class="label">⚔️</span> <span id="sr-weapon" class="val"></span><br>
                <span class="label">🛡️</span> <span id="sr-armor" class="val"></span><br>
                <span class="label">💰</span> <span id="sr-gold" class="val"></span>
                <span class="label">🧪</span> <span id="sr-pot" class="val"></span>
            </div>
        </div>
    </div>

    <div id="start-screen">
        <h1>SCAPEGRACE</h1>
        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <div id="overlay">
        <div class="spinner"></div>
        <p id="phase-name">creating universe</p>
        <p id="phase-detail" style="color:#666; font-size:0.9em;"></p>
    </div>

    <div id="game-over">
        <h2>YOU DIED</h2>
        <p id="death-summary"></p>
        <button class="end-btn" onclick="restart()">Try Again</button>
    </div>

    <div id="victory">
        <h2>VICTORY</h2>
        <p id="victory-summary"></p>
        <button class="end-btn" onclick="restart()">New Game</button>
    </div>

    <script>
    (() => {
        const TILE = 24;
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        const logEl = document.getElementById('log');
        const overlay = document.getElementById('overlay');
        const gameOverEl = document.getElementById('game-over');
        const victoryEl = document.getElementById('victory');

        let ws, tiles = [], tileDefs = {}, monsters = [], items = [], traps = [];
        let mapW = 40, mapH = 24;
        let player = {}, revealed = new Set();
        let cameraX = 0, cameraY = 0;
        let gameOver = false;

        function connect() {
            ws = new WebSocket(`ws://${location.host}/ws`);
            ws.onmessage = e => handleMsg(JSON.parse(e.data));
            ws.onclose = () => setTimeout(connect, 2000);
        }

        function handleMsg(msg) {
            switch (msg.type) {
                case 'phase':
                    gameOverEl.classList.remove('show');
                    victoryEl.classList.remove('show');
                    overlay.classList.add('show');
                    document.getElementById('phase-name').textContent = msg.phase;
                    document.getElementById('phase-detail').textContent = msg.detail || '';
                    break;
                case 'full_state':
                    overlay.classList.remove('show');
                    gameOverEl.classList.remove('show');
                    victoryEl.classList.remove('show');
                    gameOver = false;
                    loadState(msg);
                    break;
                case 'update':
                    applyUpdate(msg);
                    break;
                case 'error':
                    overlay.classList.remove('show');
                    appendLog(msg.message, '#ef5350');
                    break;
            }
        }

        function loadState(msg) {
            tiles = msg.tiles;
            tileDefs = msg.tile_defs;
            mapW = msg.width;
            mapH = msg.height;
            player = msg.player;
            monsters = msg.monsters;
            items = msg.items;
            traps = msg.traps || [];
            revealed = new Set();
            for (const [x, y] of msg.revealed) revealed.add(`${x},${y}`);

            const titleEl = document.getElementById('level-title');
            const descEl = document.getElementById('level-desc');
            titleEl.textContent = msg.title || '';
            descEl.textContent = msg.description || '';

            if (msg.font) {
                const encoded = encodeURIComponent(msg.font);
                document.getElementById('font-link').href =
                    `https://fonts.googleapis.com/css2?family=${encoded}&display=swap`;
                titleEl.style.fontFamily = `'${msg.font}', serif`;
            }

            logEl.innerHTML = '';
            for (const entry of msg.log) appendLog(entry.text, entry.color);

            updateHud();
            buildLegend();
            resizeCanvas();
        }

        function applyUpdate(msg) {
            player = msg.player;
            if (msg.monsters) monsters = msg.monsters;
            if (msg.items) items = msg.items;
            if (msg.traps) traps = msg.traps;

            if (msg.move_result?.revealed) {
                for (const [x, y] of msg.move_result.revealed) revealed.add(`${x},${y}`);
            }

            logEl.innerHTML = '';
            for (const entry of msg.log) appendLog(entry.text, entry.color);

            if (msg.victory) {
                gameOver = true;
                document.getElementById('victory-summary').textContent =
                    `Level ${player.level} · ${player.gold} gold · ${player.weapon}`;
                spawnConfetti();
                setTimeout(() => victoryEl.classList.add('show'), 1500);
            } else if (msg.game_over) {
                gameOver = true;
                document.getElementById('death-summary').textContent =
                    `Level ${player.level} · ${player.gold} gold`;
                gameOverEl.classList.add('show');
            }

            updateHud();
            buildLegend();
            updateCamera();
            render();
        }

        function spawnConfetti() {
            const colors = ['#ffd700', '#e94560', '#44ff44', '#4fc3f7', '#ff8844', '#ab47bc', '#fff'];
            for (let i = 0; i < 80; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (6 + Math.random() * 8) + 'px';
                el.style.height = (6 + Math.random() * 8) + 'px';
                el.style.animationDuration = (2 + Math.random() * 3) + 's';
                el.style.animationDelay = (Math.random() * 2) + 's';
                el.style.opacity = 0.8 + Math.random() * 0.2;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 6000);
            }
        }

        function appendLog(text, color) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.style.color = color || '#ccc';
            div.textContent = text;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateHud() {
            const hpPct = player.max_hp > 0 ? player.hp / player.max_hp : 0;
            const hpCls = hpPct > 0.5 ? 'hp-good' : hpPct > 0.25 ? 'hp-mid' : 'hp-low';
            const srHp = document.getElementById('sr-hp');
            srHp.textContent = `${player.hp}/${player.max_hp}`;
            srHp.className = 'val ' + hpCls;
            document.getElementById('sr-lvl').textContent = player.level;
            document.getElementById('sr-xp').textContent = `${player.xp}/${player.xp_to_next}`;
            document.getElementById('sr-atk').textContent = player.attack + player.weapon_damage;
            document.getElementById('sr-def').textContent = player.defense + player.armor_defense;
            document.getElementById('sr-weapon').textContent = player.weapon;
            document.getElementById('sr-armor').textContent = player.armor;
            document.getElementById('sr-gold').textContent = player.gold;
            document.getElementById('sr-pot').textContent = player.potions;
        }

        function buildLegend() {
            const el = document.getElementById('legend');
            let html = '';
            const visionR = 5;

            // Only show monsters on revealed tiles
            const seen = new Set();
            for (const mon of monsters) {
                if (!revealed.has(`${mon.x},${mon.y}`)) continue;
                if (seen.has(mon.name)) continue;
                seen.add(mon.name);
                const label = mon.is_boss ? `<b>${mon.name}</b>` : mon.name;
                html += `<div class="legend-row">${mon.sprite} ${label}</div>`;
            }

            // Only show items on revealed tiles
            const seenItems = new Set();
            for (const item of items) {
                if (!revealed.has(`${item.x},${item.y}`)) continue;
                if (seenItems.has(item.sprite)) continue;
                seenItems.add(item.sprite);
                html += `<div class="legend-row">${item.sprite} ${item.name}</div>`;
            }

            el.innerHTML = html;
        }

        function updateCamera() {
            cameraX = player.x - Math.floor(canvas.width / TILE / 2);
            cameraY = player.y - Math.floor(canvas.height / TILE / 2);
        }

        function resizeCanvas() {
            const panel = document.getElementById('map-panel');
            canvas.width = panel.clientWidth;
            canvas.height = panel.clientHeight;
            updateCamera();
            render();
        }
        window.addEventListener('resize', resizeCanvas);

        function render() {
            if (!tiles.length) return;
            const w = canvas.width, h = canvas.height;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);

            const tilesX = Math.ceil(w / TILE) + 1;
            const tilesY = Math.ceil(h / TILE) + 1;
            const visionR = 5;

            for (let sy = 0; sy < tilesY; sy++) {
                for (let sx = 0; sx < tilesX; sx++) {
                    const tx = cameraX + sx;
                    const ty = cameraY + sy;
                    if (tx < 0 || ty < 0 || tx >= mapW || ty >= mapH) continue;
                    if (!revealed.has(`${tx},${ty}`)) continue;

                    const tileType = tiles[ty]?.[tx];
                    if (!tileType) continue;
                    const def = tileDefs[tileType];
                    if (!def) continue;

                    const screenX = sx * TILE;
                    const screenY = sy * TILE;
                    const dist = Math.sqrt((tx - player.x) ** 2 + (ty - player.y) ** 2);
                    const inVision = dist <= visionR;

                    ctx.fillStyle = def.color;
                    ctx.fillRect(screenX, screenY, TILE, TILE);

                    if (def.char_display) {
                        ctx.fillStyle = inVision ? '#ffffff44' : '#ffffff22';
                        ctx.font = `${TILE * 0.55}px monospace`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(def.char_display, screenX + TILE / 2, screenY + TILE / 2);
                    }

                    if (!inVision) {
                        ctx.fillStyle = 'rgba(0,0,0,0.5)';
                        ctx.fillRect(screenX, screenY, TILE, TILE);
                    }

                    ctx.strokeStyle = '#ffffff06';
                    ctx.strokeRect(screenX, screenY, TILE, TILE);
                }
            }

            // Items
            for (const item of items) {
                if (!revealed.has(`${item.x},${item.y}`)) continue;
                const dist = Math.sqrt((item.x - player.x) ** 2 + (item.y - player.y) ** 2);
                if (dist > visionR) continue;
                const sx = (item.x - cameraX) * TILE;
                const sy = (item.y - cameraY) * TILE;
                ctx.font = `${TILE * 0.65}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.sprite, sx + TILE / 2, sy + TILE / 2);
            }

            // Triggered traps
            for (const trap of traps) {
                if (!revealed.has(`${trap.x},${trap.y}`)) continue;
                const sx = (trap.x - cameraX) * TILE;
                const sy = (trap.y - cameraY) * TILE;
                ctx.fillStyle = 'rgba(255,0,0,0.3)';
                ctx.fillRect(sx, sy, TILE, TILE);
                ctx.strokeStyle = '#ff4444';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(sx + 4, sy + 4);
                ctx.lineTo(sx + TILE - 4, sy + TILE - 4);
                ctx.moveTo(sx + TILE - 4, sy + 4);
                ctx.lineTo(sx + 4, sy + TILE - 4);
                ctx.stroke();
                ctx.lineWidth = 1;
            }

            // Monsters
            for (const mon of monsters) {
                if (!revealed.has(`${mon.x},${mon.y}`)) continue;
                const dist = Math.sqrt((mon.x - player.x) ** 2 + (mon.y - player.y) ** 2);
                if (dist > visionR + (mon.is_boss ? 1 : 0)) continue;
                const sx = (mon.x - cameraX) * TILE;
                const sy = (mon.y - cameraY) * TILE;

                if (mon.is_boss) {
                    // Boss renders as 2x2
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 16;
                    ctx.font = `${TILE * 1.5}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(mon.sprite, sx + TILE, sy + TILE);
                    ctx.shadowBlur = 0;

                    // HP bar spans 2 tiles
                    const pct = mon.hp / mon.max_hp;
                    if (pct < 1) {
                        const barW = TILE * 2 - 4;
                        ctx.fillStyle = '#000';
                        ctx.fillRect(sx + 2, sy + TILE * 2 - 5, barW, 4);
                        ctx.fillStyle = pct > 0.5 ? '#66bb6a' : pct > 0.25 ? '#ffa726' : '#ef5350';
                        ctx.fillRect(sx + 2, sy + TILE * 2 - 5, barW * pct, 4);
                    }
                } else {
                    ctx.font = `${TILE * 0.7}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(mon.sprite, sx + TILE / 2, sy + TILE / 2);

                    const pct = mon.hp / mon.max_hp;
                    if (pct < 1) {
                        ctx.fillStyle = '#000';
                        ctx.fillRect(sx + 2, sy + TILE - 5, TILE - 4, 3);
                        ctx.fillStyle = pct > 0.5 ? '#66bb6a' : pct > 0.25 ? '#ffa726' : '#ef5350';
                        ctx.fillRect(sx + 2, sy + TILE - 5, (TILE - 4) * pct, 3);
                    }
                }
            }

            // Player
            const px = (player.x - cameraX) * TILE;
            const py = (player.y - cameraY) * TILE;
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(px + TILE / 2, py + TILE / 2, TILE * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.lineWidth = 1;
        }

        document.addEventListener('keydown', e => {
            if (gameOver) return;
            let dx = 0, dy = 0;
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': dy = -1; break;
                case 'ArrowDown': case 's': case 'S': dy = 1; break;
                case 'ArrowLeft': case 'a': case 'A': dx = -1; break;
                case 'ArrowRight': case 'd': case 'D': dx = 1; break;
                case 'p': case 'P':
                    e.preventDefault();
                    ws.send(JSON.stringify({type: 'potion'}));
                    return;
                default: return;
            }
            e.preventDefault();
            ws.send(JSON.stringify({type: 'move', dx, dy}));
        });

        window.startGame = function() {
            document.getElementById('start-screen').classList.add('hide');
            ws.send(JSON.stringify({type: 'start'}));
        };

        window.restart = function() {
            document.querySelectorAll('.confetti').forEach(e => e.remove());
            ws.send(JSON.stringify({type: 'restart'}));
        };

        connect();
    })();
    </script>
</body>
</html>
